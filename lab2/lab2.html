<html>
<head>
    <title>Список дел</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Grenze+Gotisch:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="todo-container">
        <header>
            <div class="logo-container">
                <img class="image" src="title.jpg">
                <h1 class="title-animation">Список дел</h1>
            </div>
        </header>

        <form>
        <div class="input-class">
            <input type="text" placeholder="Новый элемент списка" class="input">
            <div class="buttons-class">
                <button class="add" type="button">Создать</button>
                <button class="clear" type="reset">Очистить всё</button>
            </div>
            
        </div>
        </form>

       <ul class="todo-list">
         <li class="todo-item">
            <input type="checkbox" id="check1">
            <label for="check1"> 
                <span class="checkmark">✔</span>
                <div class="text-wrapper">
                    <p class="text">Почесать кошку</p>
                    <p class="date">от 14.09.2023</p>
                </div>
            <button class="delete">✖</button>
            </label>
        </li>

        <li class="todo-item">
            <input type="checkbox" id="check2">
            <label for="check2"> 
                <span class="checkmark">✔</span>
                <div class="text-wrapper">
                    <p class="text">Почесать кошку aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa</p>
                    <p class="date">от 14.09.2023</p>
                </div>
            <button class="delete">✖</button>
            </label>
        </li>

        <li class="todo-item">
            <input type="checkbox" id="check3">
            <label for="check3"> 
                <span class="checkmark">✔</span>
                <div class="text-wrapper">
                    <p class="text">Почесать кошку aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa</p>
                    <p class="date">от 14.09.2023</p>
                </div>
            <button class="delete">✖</button>
            </label>
        </li>             
       </ul>

    </div>
    <footer>
        <hr> Copyright &copy;
    </footer>
</body>
</html>
